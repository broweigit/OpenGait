# Switch notes:
# - Active config below is CCPG train/test with class_num: 100.
# - For CCGR_MINI training, replace data_cfg with the CCGR_MINI TRAIN block and set class_num: 571.
# - For cross-domain testing, dataset_name should stay as the checkpoint's training dataset
#   because OpenGait uses it in output/<dataset_name>/<model>/<save_name>/checkpoints.
# - For cross-domain testing with a CCPG checkpoint, keep class_num: 100.
# - For cross-domain testing with a CCGR_MINI checkpoint, use class_num: 571.

# ===== CCPG TRAIN / CCPG TEST =====
data_cfg:
  dataset_name: CCPG
  dataset_root: /data/CCPG/Released/CCPG-ratio-pkl
  dataset_partition: ./datasets/CCPG/CCPG.json
  data_in_use: [True, False]
  num_workers: 8
  remove_no_gallery: false
  test_dataset_name: CCPG

