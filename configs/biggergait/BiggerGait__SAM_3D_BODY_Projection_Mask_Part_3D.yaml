data_cfg:
  dataset_name: CCPG
  dataset_root: /data/CCPG/Released/CCPG-ratio-pkl
  dataset_partition: ./datasets/CCPG/CCPG.json
  data_in_use: [True, False]
  num_workers: 8
  remove_no_gallery: false
  test_dataset_name: CCPG

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: False
  restore_hint: 30000
  save_name: BiggerGait__SAM3DBody__Projection_Mask_Part_3D_Gaitbase_Share
  eval_func: evaluate_CCPG_part
  sampler:
    batch_shuffle: false
    batch_size: 4
    sample_type: all_ordered
    frames_all_limit: 250
  metric: euc
  transform:
    - type: BaseRgbTransform

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true

model_cfg:
  chunk_size: 8
  model: BiggerGait__SAM3DBody__Projection_Mask_Part_3D_Gaitbase_Share
  # 这里填写 sam-3d-body 源码的绝对路径，代码会自动添加到 sys.path
  pretrained_lvm: pretrained_LVMs/sam-3d-body
  # pretrained_lvm: ./pretrained_LVMs/dinov3-vith16plus-pretrain-lvd1689m 
  pretrained_mask_branch: BYPASS
  
  # SAM 3D Body (DINOv3) 必须使用 512x512
  image_size: 256                                                                 
  sils_size: 32                                 
  
  # DINOv3 ViT-Huge 维度
  source_dim: 1280
  
  # =========================================================
  # 🌟 新增：精确层控制配置
  # =========================================================
  num_FPN: 4  # [要求3] FPN 数量
  
  layer_config:
    trans_layer_mask: [True, True, True, True, True, True]
    # trans_layer_mask: [False, False, True, True, False, False]

    hook_mask: 
      - False # 0
      - False # 1
      - False # 2
      - False # 3
      - False # 4
      - False # 5
      - False # 6
      - False # 7
      - False # 8
      - False # 9
      - False # 10
      - False # 11
      - False # 12
      - False # 13
      - False # 14
      - False # 15
      - True  # 16
      - True  # 17
      - True  # 18
      - True  # 19
      - True  # 20
      - True  # 21
      - True  # 22
      - True  # 23
      - True  # 24
      - True  # 25
      - True  # 26
      - True  # 27
      - True  # 28
      - True  # 29
      - True  # 30
      - True  # 31

    hook_sample_type: "interleave" # "chunk" or "interleave"
  
  num_unknown: 16

  ot_temperature: 0.01
  ot_dist_thresh: 0.2
  ot_iters: 8
  # 🌟 核心修改：分支独立配置
  branch_configs:
    - angle: [90.0, 0.0]    # 侧视
      h_ratio: 2.0          # 高度为 2.0 * width (512x256)
      parts: 16             # HPP 划分 16 块
      use_tpose: false      # 保持原始姿态
      vertical_pooling: false
    # - angle: [45.0, 45.0]
    #   h_ratio: 1.25         # 高度减小，适应俯视 (约 307x256)
    #   parts: 10             # 缩减 Part 数量，避免采样空白
    #   use_tpose: false
    #   vertical_pooling: false
    # - angle: [-45.0, 60.0]
    #   h_ratio: 0.75          # 接近正视，保持 1:1
    #   parts: 6              # 同样缩减 Part 数量
    #   use_tpose: false
    #   vertical_pooling: false
    - angle: [0.0, 0.0]
      h_ratio: 2.0
      parts: 8
      use_tpose: true
      vertical_pooling: true


  enable_visual: true  # 是否启用可视化输出（仅训练时）
  
  Mask_Branch:
    source_dim: 1280  # 注意：这里也要改成 1280，因为 MaskBranch 也是接在 Backbone 后面
    target_dim: 2
    p: 0.
    softmax: True
    Relu: False
    Up: True

  backbone_cfg:
    type: ResNet9
    block: BasicBlock_Time
    in_channel: 16
    channels:
      - 64
      - 128
      - 256
      - 512
    layers:
      - 1
      - 1
      - 1
      - 1
    strides:
      - 1
      - 2
      - 1
      - 1
    maxpool: false
  SeparateFCs:
    in_channels: 512
    out_channels: 256
    parts_num: 16
  SeparateBNNecks:
    class_num: 100
    in_channels: 256
    parts_num: 16
  bin_num:
    - 16

optimizer_cfg:
  lr: 0.1
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones:
    - 10000
    - 20000
  scheduler: MultiStepLR

trainer_cfg:
  find_unused_parameters: True
  enable_float16: true
  fix_BN: false
  log_iter: 1
  with_test: true
  restore_ckpt_strict: true
  restore_hint: 0
  save_iter: 5000
  save_name: BiggerGait__SAM3DBody__Projection_Mask_Part_3D_Gaitbase_Share
  sync_BN: true
  total_iter: 1
  sampler:
    batch_shuffle: true
    batch_size:
      - 8
      - 4 # 显存警告：SAM 3D Body 很大，如果 OOM，请将此值减小到 2
    frames_num_fixed: 30
    frames_skip_num: 4
    frames_num_max: 40
    frames_num_min: 20
    sample_type: fixed_unordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: RandomHorizontalFlip
        - type: BaseRgbTransform